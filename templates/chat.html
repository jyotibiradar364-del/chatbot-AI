<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat with BroKod</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body class="chat-body">
    <a href="/" class="back-btn">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="19" y1="12" x2="5" y2="12"></line>
            <polyline points="12 19 5 12 12 5"></polyline>
        </svg>
        Back to Dashboard
    </a>
    <div class="chat-wrapper">
        <div class="chat-main" id="chat-container">
            <!-- Welcome Screen (Initial State) -->
            <div class="welcome-screen" id="welcome-screen">
                <h1>Welcome <span class="highlight">User!</span></h1>
                <p>Hey buddy! Need any assistance or up for a chat?</p>
            </div>

            <div class="chat-messages" id="chat-messages">
                <!-- Messages will appear here after interaction -->
            </div>
        </div>

        <div class="input-container">
            <form id="chat-form">
                <div class="input-box">
                    <input type="text" id="user-input" placeholder="Start your chat with BroKod..." autocomplete="off">
                    <button type="submit" id="send-btn">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="20" height="20">
                            <line x1="12" y1="19" x2="12" y2="5"></line>
                            <polyline points="5 12 12 5 19 12"></polyline>
                        </svg>
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>

</html>
